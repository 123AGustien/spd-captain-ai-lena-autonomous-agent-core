<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPD AI LENA MOBILE HARDENED COCKPIT</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #05070a;
  color: #00ff99;
}

h2 {
  text-align: center;
  color: white;
  margin: 10px 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  padding: 10px;
}

.panel {
  border: 1px solid #00ff99;
  border-radius: 6px;
  padding: 10px;
  background: #0b0f14;
}

.flow {
  color: #888;
  font-size: 13px;
}
</style>
</head>

<body>

<h2>🧠 CAPTAIN AI LENA — MOBILE HARDENED COCKPIT</h2>

<div class="grid">

<div class="panel">
<h3>INPUT</h3>
<pre id="input"></pre>
</div>

<div class="panel">
<h3>RISK</h3>
<div id="risk"></div>
</div>

<div class="panel">
<h3>OUTPUT</h3>
<pre id="output"></pre>
</div>

<div class="panel">
<h3>DECISION</h3>
<pre id="decision"></pre>
</div>

<div class="panel">
<h3>FLOW</h3>
<div id="flow" class="flow"></div>
</div>

</div>

<script>

/* =========================
   STATE (NO DRIFT)
========================= */
const state = {
  fx: 10,
  energy: 50,
  cyb: 50
};

/* =========================
   ENGINE CONTROL
========================= */
let tick = 0;
let lastRun = 0;

/* =========================
   MODULES
========================= */

function riskModule(fx, energy, cyb){
  const score = fx + (100 - energy) + cyb;
  if(score > 140) return "HIGH RISK";
  if(score > 90) return "MEDIUM RISK";
  return "LOW RISK";
}

function energyModule(e){
  return e < 30 ? "LOW ENERGY MODE" : "NORMAL ENERGY";
}

function fxModule(fx){
  return fx > 30 ? "FX STABLE" : "FX WEAK";
}

function decide(risk, energy, fx){
  if(risk==="HIGH RISK") return "ACTIVATE STABILIZATION";
  if(energy==="LOW ENERGY MODE") return "REDUCE LOAD";
  if(fx==="FX WEAK") return "FX CORRECTION";
  return "SYSTEM STABLE";
}

/* =========================
   CORE ENGINE
========================= */

function runLiveCycle(){

  const fx = fxModule(state.fx);
  const energy = energyModule(state.energy);
  const risk = riskModule(state.fx, state.energy, state.cyb);
  const decision = decide(risk, energy, fx);

  document.getElementById("input").innerText =
    JSON.stringify(state, null, 2);

  document.getElementById("risk").innerText = risk;

  document.getElementById("output").innerText =
`FX: ${fx}
ENERGY: ${energy}
RISK: ${risk}`;

  document.getElementById("decision").innerText = decision;

  const flow = ["OBSERVE","DECIDE","ACT","UPDATE"];
  document.getElementById("flow").innerText =
    "FLOW → " + flow[tick % 4];

  tick++;
}

/* =========================
   MOBILE HARDENED LOOP
========================= */

function loop(timestamp){

  if(timestamp - lastRun > 1000){
    runLiveCycle();
    lastRun = timestamp;
  }

  requestAnimationFrame(loop);
}

/* START ENGINE */
requestAnimationFrame(loop);

</script>

</body>
</html>
