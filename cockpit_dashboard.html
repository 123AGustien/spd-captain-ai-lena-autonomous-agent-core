<!DOCTYPE html>
<html>
<head>
  <title>SPD Captain AI Lena Cockpit</title>

  <style>
    body {
      background: #0b0f14;
      color: #00ff88;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .panel {
      border: 1px solid #00ff88;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .muted {
      color: #aaaaaa;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h1>🧠 Captain AI Lena Cockpit</h1>

<!-- RAW STATE -->
<div class="panel">
  <div class="title">📊 Raw System State</div>
  <pre id="state">Waiting...</pre>
</div>

<!-- NORMALIZED STATE -->
<div class="panel">
  <div class="title">⚖️ Normalized State (Golden Ratio)</div>
  <pre id="normalized">Waiting...</pre>
</div>

<!-- DECISION -->
<div class="panel">
  <div class="title">⚙️ Decision Output</div>
  <pre id="decision">Idle</pre>
</div>

<!-- CONSTANTS -->
<div class="panel">
  <div class="title">📐 System Constants</div>
  <pre id="constants"></pre>
</div>

<!-- TRACE -->
<div class="panel">
  <div class="title">🔄 Agent Loop</div>
  <div class="muted">OBSERVE → NORMALIZE → DECIDE → ACT → UPDATE</div>
  <pre id="trace"></pre>
</div>

<script type="module">
  import { captainAILena } from "./captainAILena.js";
  import { GOLDEN_RATIO } from "./constants/math.constants.js";

  // ======================
  // SYSTEM STATE
  // ======================
  const state = {
    fx: 12,
    energy: 25,
    cyb: 40,
    event: "FX_SHOCK"
  };

  // ======================
  // NORMALIZATION LAYER
  // ======================
  const normalizedState = {
    ...state,
    fx: state.fx / GOLDEN_RATIO,
    energy: state.energy / GOLDEN_RATIO
  };

  // ======================
  // ENGINE EXECUTION
  // ======================
  const result = captainAILena(normalizedState);

  // ======================
  // RENDER UI
  // ======================
  document.getElementById("state").innerText =
    JSON.stringify(state, null, 2);

  document.getElementById("normalized").innerText =
    JSON.stringify(normalizedState, null, 2);

  document.getElementById("decision").innerText =
    JSON.stringify(result, null, 2);

  document.getElementById("constants").innerText =
    JSON.stringify({ GOLDEN_RATIO }, null, 2);

  document.getElementById("trace").innerText =
    "OBSERVE → NORMALIZE → DECIDE → ACT → UPDATE";
</script>

</body>
</html>
