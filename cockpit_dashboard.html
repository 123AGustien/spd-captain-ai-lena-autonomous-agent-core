<!DOCTYPE html>
<html>
<head>
  <title>SPD Captain AI Lena Cockpit</title>
  <style>
    body {
      background: #0b0f14;
      color: #00ff88;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .panel {
      border: 1px solid #00ff88;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .status {
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <h1>🧠 Captain AI Lena Cockpit</h1>

  <div class="panel">
    <div class="title">📊 System State</div>
    <div class="status" id="state">Waiting for data...</div>
  </div>

  <div class="panel">
    <div class="title">⚙️ Decision Output</div>
    <div class="status" id="decision">Idle</div>
  </div>

  <div class="panel">
    <div class="title">🔄 Agent Loop Status</div>
    <div class="status">OBSERVE → DECIDE → ACT → UPDATE</div>
  </div>

  <script type="module">
    import { captainAILena } from "./captainAILena.js";

    // SAMPLE SYSTEM STATE
    const state = {
      fx: 12,
      energy: 25,
      cyb: 40,
      event: "FX_SHOCK"
    };

    const result = captainAILena(state);

    document.getElementById("state").innerText =
      JSON.stringify(state, null, 2);

    document.getElementById("decision").innerText =
      JSON.stringify(result, null, 2);
  </script>

</body>
</html>
