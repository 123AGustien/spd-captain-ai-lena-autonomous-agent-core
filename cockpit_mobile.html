<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPD AI LENA COCKPIT SAFE</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #05070a;
  color: #00ff99;
}

h2 {
  text-align: center;
  color: white;
  margin: 10px 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  padding: 10px;
}

@media (min-width: 900px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

.panel {
  border: 1px solid #00ff99;
  border-radius: 6px;
  padding: 10px;
  background: #0b0f14;
}

label {
  display: block;
  margin-top: 8px;
}

input {
  width: 100%;
  padding: 6px;
  margin-top: 4px;
  background: #111;
  color: #00ff99;
  border: 1px solid #00ff99;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #00ff99;
  border: none;
  font-weight: bold;
}

pre {
  white-space: pre-wrap;
}

.flow {
  color: #888;
  font-size: 13px;
}
</style>
</head>

<body>

<h2>🧠 CAPTAIN AI LENA — SAFE COCKPIT</h2>

<div class="grid">

<!-- INPUT -->
<div class="panel">
<h3>INPUT</h3>

<label>FX</label>
<input id="fx" type="number" value="10">

<label>ENERGY</label>
<input id="energy" type="number" value="50">

<label>CYB</label>
<input id="cyb" type="number" value="50">

<button onclick="run()">RUN SYSTEM</button>
</div>

<!-- OUTPUT -->
<div class="panel">
<h3>OUTPUT</h3>
<pre id="output">Idle</pre>
</div>

<!-- RISK -->
<div class="panel">
<h3>RISK ENGINE</h3>
<div id="risk">LOW</div>
</div>

<!-- DECISION -->
<div class="panel">
<h3>DECISION CORE</h3>
<pre id="decision">Waiting...</pre>
</div>

<!-- FLOW -->
<div class="panel">
<h3>FLOW</h3>
<div class="flow">OBSERVE → DECIDE → ACT → UPDATE</div>
</div>

</div>

<script>
function riskModule(fx, energy, cyb) {
  const score = fx + (100 - energy) + cyb;

  if (score > 140) return "HIGH RISK";
  if (score > 90) return "MEDIUM RISK";
  return "LOW RISK";
}

function energyModule(e) {
  if (e < 30) return "LOW ENERGY MODE";
  return "NORMAL ENERGY";
}

function fxModule(fx) {
  if (fx > 30) return "FX STABILIZATION ACTIVE";
  return "FX STABLE";
}

function decide(risk, energy, fx) {
  if (risk === "HIGH RISK") return "ACTIVATE STABILIZATION MODE";
  if (energy === "LOW ENERGY MODE") return "REDUCE SYSTEM LOAD";
  if (fx.includes("STABILIZATION")) return "FX CORRECTION ACTIVE";
  return "SYSTEM STABLE";
}

function run() {

  const state = {
    fx: Number(document.getElementById("fx").value),
    energy: Number(document.getElementById("energy").value),
    cyb: Number(document.getElementById("cyb").value)
  };

  const fx = fxModule(state.fx);
  const energy = energyModule(state.energy);
  const risk = riskModule(state.fx, state.energy, state.cyb);

  const decision = decide(risk, energy, fx);

  document.getElementById("risk").innerText = risk;

  document.getElementById("output").innerText =
`FX: ${fx}
ENERGY: ${energy}
RISK: ${risk}`;

  document.getElementById("decision").innerText = decision;
}

// ==============================
// SPD COCKPIT AUTO BOOT
// ==============================
window.addEventListener("load", () => {
  document.getElementById("decision").innerText = "RUN ENGINE";
  run();
});
</script>

</body>
</html>
