<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPD Mobile Cockpit</title>
</head>

<body style="background:#000; color:#0f0; font-family:monospace; padding:10px;">

<h2>🧠 CAPTAIN AI LENA (MOBILE)</h2>

<div>
  <label>FX</label><br>
  <input id="fx" type="number" value="0"><br><br>

  <label>ENERGY</label><br>
  <input id="energy" type="number" value="50"><br><br>

  <label>CYB</label><br>
  <input id="cyb" type="number" value="50"><br><br>

  <button onclick="run()">RUN SYSTEM</button>
</div>

<pre id="output" style="margin-top:20px; background:#111; padding:10px;"></pre>

<script>
const GOLDEN_RATIO = 1.61803398875;

function run() {

  // =========================
  // RAW INPUT
  // =========================
  let fx = Number(document.getElementById("fx").value);
  let energy = Number(document.getElementById("energy").value);
  let cyb = Number(document.getElementById("cyb").value);

  // =========================
  // NORMALIZATION LAYER (SAFE)
  // =========================
  let norm_fx = fx / GOLDEN_RATIO;
  let norm_energy = energy / GOLDEN_RATIO;
  let norm_cyb = cyb; // optional (kept raw)

  // =========================
  // RISK ENGINE (USES NORMALIZED VALUES ONLY)
  // =========================
  let risk = 0;

  if (norm_cyb < 50) risk++;
  if (norm_energy < 30) risk++;
  if (norm_fx > 10) risk++;

  let decision = "SYSTEM STABLE";

  if (risk >= 2) decision = "ACTIVATE STABILIZATION MODE";
  else if (norm_energy < 30) decision = "REDUCE SYSTEM LOAD";
  else if (norm_fx > 10) decision = "FX CORRECTION ACTIVE";

  // =========================
  // OUTPUT
  // =========================
  document.getElementById("output").innerText =
`INPUT (RAW):
FX: ${fx}
ENERGY: ${energy}
CYB: ${cyb}

INPUT (NORMALIZED - GOLDEN RATIO):
FX: ${norm_fx.toFixed(2)}
ENERGY: ${norm_energy.toFixed(2)}
CYB: ${norm_cyb}

OUTPUT:
Risk Level: ${risk}
Decision: ${decision}`;
}
</script>

</body>
</html>
