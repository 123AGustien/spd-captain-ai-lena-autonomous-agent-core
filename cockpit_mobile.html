<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPD Mobile Cockpit</title>

  <style>
    body {
      background: #000;
      color: #00ff88;
      font-family: monospace;
      padding: 12px;
    }

    h2 {
      color: #ffffff;
    }

    .panel {
      border: 1px solid #00ff88;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
    }

    label {
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      margin-bottom: 10px;
      background: #111;
      color: #00ff88;
      border: 1px solid #00ff88;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00ff88;
      color: #000;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>

<h2>🧠 CAPTAIN AI LENA (MOBILE COCKPIT)</h2>

<div class="panel">
  <label>FX</label>
  <input id="fx" type="number" value="0">

  <label>ENERGY</label>
  <input id="energy" type="number" value="50">

  <label>CYB</label>
  <input id="cyb" type="number" value="50">

  <button onclick="run()">RUN SYSTEM</button>
</div>

<div class="panel">
  <h3>📊 SYSTEM OUTPUT</h3>
  <pre id="output">Waiting for execution...</pre>
</div>

<script type="module">
  import { runEngine } from "./engine.js";

  // =========================
  // SYSTEM EXECUTION ENTRY
  // =========================
  window.run = function () {

    // STEP 1: COLLECT INPUT ONLY
    const state = {
      fx: Number(document.getElementById("fx").value),
      energy: Number(document.getElementById("energy").value),
      cyb: Number(document.getElementById("cyb").value)
    };

    // STEP 2: SEND TO ENGINE (NO LOGIC HERE)
    const result = runEngine(state);

    // STEP 3: RENDER OUTPUT ONLY
    document.getElementById("output").innerText =
`INPUT:
${JSON.stringify(result.input, null, 2)}

OUTPUT:
${JSON.stringify(result.output, null, 2)}

STATUS: ${result.status}
TIME: ${result.timestamp}`;
  };
</script>

</body>
</html>
