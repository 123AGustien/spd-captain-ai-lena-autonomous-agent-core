<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPD Simulation Screen</title>

  <style>
    body {
      background: #05070a;
      color: #00ff99;
      font-family: monospace;
      padding: 15px;
    }

    h2 {
      color: white;
    }

    .panel {
      border: 1px solid #00ff99;
      padding: 12px;
      margin-top: 12px;
      border-radius: 6px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      background: #111;
      color: #00ff99;
      border: 1px solid #00ff99;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00ff99;
      color: #000;
      font-weight: bold;
      border: none;
    }

    pre {
      white-space: pre-wrap;
    }

    .flow {
      color: #888;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>🧠 SPD LIVE SIMULATION SCREEN</h2>

<div class="panel">
  <label>FX</label>
  <input id="fx" type="number" value="10">

  <label>ENERGY</label>
  <input id="energy" type="number" value="50">

  <label>CYB</label>
  <input id="cyb" type="number" value="50">

  <button onclick="run()">RUN SIMULATION</button>
</div>

<div class="panel">
  <h3>📥 INPUT</h3>
  <pre id="input">Waiting...</pre>
</div>

<div class="panel">
  <h3>⚙️ OUTPUT</h3>
  <pre id="output">Idle</pre>
</div>

<div class="panel">
  <h3>🔁 FLOW</h3>
  <div class="flow">OBSERVE → DECIDE → ACT → UPDATE</div>
</div>

<script type="module">
  import { runEngine } from "./engine.js";

  window.run = function () {

    const state = {
      fx: Number(document.getElementById("fx").value),
      energy: Number(document.getElementById("energy").value),
      cyb: Number(document.getElementById("cyb").value)
    };

    const result = runEngine(state);

    document.getElementById("input").innerText =
      JSON.stringify(result.input, null, 2);

    document.getElementById("output").innerText =
      JSON.stringify(result.output, null, 2);
  };
</script>

</body>
</html>
