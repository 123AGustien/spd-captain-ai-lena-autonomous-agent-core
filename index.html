<!DOCTYPE html>
<html>
<head>
  <title>SPD Cockpit Engine</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #00ffcc;
      padding: 20px;
    }

    h1 {
      color: white;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
      border: none;
      background: #00ffcc;
      color: #000;
    }

    pre {
      background: #111822;
      padding: 15px;
      margin-top: 20px;
      overflow: auto;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>🧠 SPD Cockpit Engine</h1>

  <p>Input State:</p>

  <button onclick="run()">RUN ENGINE</button>

  <pre id="output">Waiting...</pre>

  <script type="module">
    import { runEngine } from "./engine/runEngine.js";

    window.run = function () {

      const state = {
        energy: 3,
        fx: 2,
        cyb: 0,
        inf: 0
      };

      try {
        const result = runEngine(state);

        document.getElementById("output").innerText =
          JSON.stringify(result, null, 2);

      } catch (err) {
        document.getElementById("output").innerText =
          "ENGINE ERROR:\n" + err.message;
      }
    };
  </script>

</body>
</html>
